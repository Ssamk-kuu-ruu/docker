<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Sign up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+YQ4/6H6Y5b1r2l0yQFh3jFQ1YkQm5Q5Y5o1Jg1l5Y5r5Q5s5G5Y5"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(120deg, #fffaf0, #f0fbff);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
      }
      .card {
        border: 0;
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(22, 45, 80, 0.06);
      }
      .brand {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card p-4">
            <div class="text-center mb-3">
              <h3 class="brand">Create your account</h3>
              <p class="text-muted">
                Join PSU Sphere — quick sign up with email or social accounts.
              </p>
            </div>
            <div class="mb-3">
              <button class="btn btn-outline-secondary btn-block mb-2">
                <i class="fab fa-google mr-2"></i> Continue with Google
              </button>
              <button class="btn btn-outline-secondary btn-block">
                <i class="fab fa-github mr-2"></i> Continue with GitHub
              </button>
            </div>
            <div class="text-center text-muted my-2">OR</div>
            <form>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label>First name</label>
                  <input
                    class="form-control"
                    placeholder="First name"
                    type="text"
                  />
                </div>
                <div class="form-group col-md-6">
                  <label>Last name</label>
                  <input
                    class="form-control"
                    placeholder="Last name"
                    type="text"
                  />
                </div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input
                  class="form-control"
                  placeholder="you@example.edu"
                  type="email"
                />
              </div>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label>Password</label>
                  <input
                    class="form-control"
                    placeholder="Password"
                    type="password"
                  />
                </div>
                <div class="form-group col-md-6">
                  <label>Confirm</label>
                  <input
                    class="form-control"
                    placeholder="Confirm password"
                    type="password"
                  />
                </div>
              </div>
              <button class="btn btn-primary btn-block" type="submit">
                Create account
              </button>
            </form>
            <p class="text-center mt-3 mb-0">
              Already have an account? <a href="login.html">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
