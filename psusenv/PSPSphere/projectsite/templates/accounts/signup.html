{% load socialaccount %} {% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign Up — PSUSphere</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-+YQ4/6H6Y5b1r2l0yQFh3jFQ1YkQm5Q5Y5o1Jg1l5Y5r5Q5s5G5Y5"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: #f4f6fb;
        font-family: Helvetica, Arial, sans-serif;
      }
      .card {
        max-width: 680px;
        margin: 48px auto;
        padding: 28px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(20, 30, 60, 0.06);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3 style="margin-top: 0">Create an account</h3>
      <p style="color: #556">Sign up with a social account or use your email</p>
      <div style="margin-bottom: 12px">
        <a
          href="{% provider_login_url 'google' %}"
          class="btn btn-outline-secondary"
          ><i class="fab fa-google"></i> Sign up with Google</a
        >
        <a href="{% provider_login_url 'github' %}" class="btn btn-dark"
          ><i class="fab fa-github"></i> Sign up with GitHub</a
        >
      </div>
      <hr />

      <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            value="{{ form.username.value|default_if_none:'' }}"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ form.email.value|default_if_none:'' }}"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password1"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input
            type="password"
            name="password2"
            class="form-control"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary">Create account</button>
      </form>

      <p class="small" style="margin-top: 12px">
        Already have an account? <a href="{% url 'account_login' %}">Sign in</a>
      </p>
    </div>
  </body>
</html>
